name: froide-evidencecollection CI

on: push

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: j178/prek-action@v1

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v6
      - name: Setup uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: ${{ matrix.python-version }}
          activate-environment: true
      - name: Install system-level dependencies
        run: sudo apt-get update && sudo apt-get install libxml2-dev libxslt1-dev libgdal-dev gdal-bin libmagic-dev libmagickwand-dev libpoppler-cpp-dev gettext
      - name: Install dependencies
        run: |
          uv sync
          uv pip install -e . --no-deps
      - name: Compile translations
        run: |
          python manage.py compilemessages -l de
      - name: Run tests
        run: |
          coverage run -m pytest
          coverage report --format=markdown >> $GITHUB_STEP_SUMMARY
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: froide_evidencecollection
          POSTGRES_PASSWORD: froide_evidencecollection
          POSTGRES_DB: froide_evidencecollection
        ports:
          - 5432:5432