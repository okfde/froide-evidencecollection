name: Update translations

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  translations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install system-level dependencies
        run: sudo apt-get update && sudo apt-get install libgdal-dev gdal-bin gettext
      - name: Setup uv
        uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: '3.13'
          activate-environment: true
      - name: Install dependencies
        run: |
          uv sync
          uv pip install -e . --no-deps
      - name: Setup Git
        run: |
          git config user.name "fdsbot"
          git config user.email "119665132+fdsbot@users.noreply.github.com"
      - name: Compile translations
        run: make messagesde
      - name: Commit translations
        run: |
          git add **/django.po || true
          git commit -m "💬 update translation messages" || true
          git push -u origin main:weblate-source --force